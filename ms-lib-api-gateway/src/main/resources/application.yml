spring:
  application:
    name: ms-lib-api-gateway
  # Config Server (opcional)
  config:
    import: "optional:configserver:http://localhost:8888"
  # Resource Server: valida el JWT con la clave publica del ms-seguridad (JWKS)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: "http://localhost:8081/oauth2/jwks"
server:
  port: 8080
# Eureka
eureka:
  client:
    service-url:
      defaultZone: "http://localhost:8761/eureka/"
  instance:
    prefer-ip-address: true
