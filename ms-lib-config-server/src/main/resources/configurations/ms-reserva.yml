server:
  port: 8082
spring:
  datasource:
    url: "jdbc:postgresql://localhost:5433/db_reserva"
    username: postgres
    password: oracle123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  # Resource Server: valida el JWT con la clave publica del ms-seguridad (JWKS)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: "http://localhost:8081/oauth2/jwks"
