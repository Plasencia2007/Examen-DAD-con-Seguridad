spring:
  application:
    name: ms-reserva
  # Config Server (opcional: si está arriba sobreescribe lo local)
  config:
    import: "optional:configserver:http://localhost:8888"
  # PostgreSQL
  datasource:
    url: "jdbc:postgresql://localhost:5433/db_reserva"
    username: postgres
    password: oracle123
    driver-class-name: org.postgresql.Driver
  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  # Resource Server: valida el JWT con la clave pública del ms-seguridad (JWKS)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: "http://localhost:8081/oauth2/jwks"
server:
  port: 8082
# Eureka
eureka:
  client:
    service-url:
      defaultZone: "http://localhost:8761/eureka/"
  instance:
    prefer-ip-address: true
